# Pagefind Configuration
# https://pagefind.app/docs/config-options/

# Source directory for indexing.
# Default build uses CLI flag: pagefind --site .next
# Static export (build:static) uses CLI flag: pagefind --site out
# This value is a fallback when no --site flag is provided.
site: .next

# Output directory for search index
output_subdirectory: _pagefind

# Root selector - indexes rendered content within <main>,
# which excludes Fumadocs sidebar, TOC panel, and header/footer.
root_selector: "main"

# Exclude elements from indexing
exclude_selectors:
  - "nav"
  - "header"
  - "footer"
  - "[data-pagefind-ignore]"
  - ".not-prose"
  - ".code-block"
  - "pre"
  - "[role='search']"
  - ".fd-toc"

# Auto-detect content language (supports zh + en)
# force_language: zh

# Keep index files small
keep_index_url: true

# Bundle all files
bundle_size: 100000
